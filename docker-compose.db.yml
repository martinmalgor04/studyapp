version: '3.8'

# ================================
# StudyApp - Solo Base de Datos
# ================================
# Para usar con: pnpm dev (app) + PostgreSQL (Docker)

services:
  # ----------------
  # PostgreSQL Database
  # ----------------
  db:
    container_name: studyapp-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"  # Puerto 5433 para no chocar con Supabase local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studyapp
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studyapp-network

  # ----------------
  # Adminer (DB UI opcional)
  # ----------------
  adminer:
    container_name: studyapp-adminer
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - db
    networks:
      - studyapp-network

volumes:
  postgres-data:
    driver: local

networks:
  studyapp-network:
    driver: bridge
